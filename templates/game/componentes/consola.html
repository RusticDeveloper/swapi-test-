<div
    class="bg-gray-900/90 border border-gray-800 rounded-2xl p-4 flex flex-col justify-between space-y-3 shadow-2xl h-full"
>
    <div>
        <h2
            class="text-[10px] font-bold tracking-widest text-gray-400 uppercase mb-2"
        >
            Energía (Turno)
        </h2>
        <div class="flex flex-wrap gap-1 mb-4">
            <template x-for="i in esferas_max">
                <img
                    src="/static/images/esferas/1.png"
                    :class="i <= esferas_actuales ? 'opacity-100 drop-shadow-[0_0_6px_rgba(245,158,11,0.6)] scale-105' : 'opacity-15 grayscale'"
                    class="w-6 h-6 object-contain transition-all duration-300"
                />
            </template>
        </div>

        <div class="space-y-2 font-mono text-[11px]">
            <div
                class="bg-gray-950 p-2 border border-red-900/40 rounded-lg flex justify-between items-center"
            >
                <span class="text-red-400 font-bold uppercase">Rival CPU</span>
                <span
                    class="text-gray-200 font-extrabold"
                    x-text="cpu_lp + ' LP'"
                ></span>
            </div>
            <div
                class="bg-gray-950 p-2 border border-green-900/40 rounded-lg flex justify-between items-center"
            >
                <span class="text-green-400 font-bold uppercase"
                    >Tu Cuenta</span
                >
                <span
                    class="text-gray-200 font-extrabold"
                    x-text="player_lp + ' LP'"
                ></span>
            </div>
        </div>
    </div>

    <div class="flex-grow flex flex-col h-44">
        <div
            class="bg-gray-950 rounded-xl p-2 border border-gray-800 flex-grow overflow-y-auto text-[11px] font-mono space-y-1 text-gray-400 h-0"
        >
            <template x-for="log in historial">
                <p
                    class="border-b border-gray-900/50 pb-1 text-gray-300"
                    x-text="log"
                ></p>
            </template>
        </div>
    </div>

    <div class="space-y-2">
        <button
            @click="terminarTurno()"
            class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-black py-2.5 rounded-xl text-xs tracking-wider hover:brightness-110 transition shadow-lg"
        >
            🛡️ TERMINAR TURNO
        </button>
        <button
            @click="cargarMazo()"
            class="w-full bg-gray-800 text-gray-400 font-bold py-1.5 rounded-xl text-xs hover:text-gray-200 transition"
        >
            🔮 Invocar Mazo
        </button>
    </div>
</div>
