{% extends 'base.html' %} {% load static %} {% block title %}Arena de Batalla -
DBZ Card Battle{% endblock %} {% block content %}
<div
    class="flex flex-col xl:flex-row gap-4 w-full px-4 pb-10 min-h-[85vh] select-none"
    x-data="{
        player_lp: $persist(30000),
        cpu_lp: $persist(30000),
        turno: $persist(1),
        esferas_max: $persist(1),
        esferas_actuales: $persist(1),
        historial: $persist(['¡Listo para el combate!']),
        mano: [],
        mazo_jugador: [],  // Añadimos tu propio mazo
        mazo_cpu: [],
        campo_jugador: [],
        campo_cpu: [],
        cementerio: [],
        loading: false,
        guerrero_atacante: null,

        reiniciarMecanicas() {
            localStorage.clear(); // Esto limpia todo el historial guardado
            this.player_lp = 30000;
            this.cpu_lp = 30000;
            this.turno = 1;
            this.esferas_max = 1;
            this.esferas_actuales = 1;
            this.campo_jugador = [];
            this.campo_cpu = [];
            this.mano = [];
            this.guerrero_atacante = null;
            this.historial = ['¡Partida reiniciada! ¡Listo para el combate!'];
        },

        async cargarMazo() {
            this.loading = true;

            // 1. Limpiamos el almacenamiento local (localStorage) ANTES de pedir cartas nuevas
            localStorage.clear();

            try {
                let res = await fetch('/juego/api/mazo/');
                let data = await res.json();
                if(data.status === 'success') {
                    // 2. Reseteamos los valores a cero
                    this.reiniciarMecanicas();

                    // 3. Asignamos los mazos nuevos
                    this.mano = data.cartas.slice(0, 7);
                    this.mazo_jugador = data.cartas.slice(7, 17);
                    this.mazo_cpu = data.cartas.slice(17, 35);

                    this.historial = ['🔮 ¡Cartas cargadas y partida nueva iniciada!'];
                    this.turnoCPU();
                }
            } catch(e) {
                this.historial.unshift('❌ Error al conectar con la API.');
            }
            this.loading = false;
        },

        invocarA(carta) {
            if (this.esferas_actuales < carta.costo) {
                this.historial.unshift('❌ Falta energía.');
                return;
            }
            // Límite estricto de 5 cartas en el tablero
            if (this.campo_jugador.length >= 5) {
                this.historial.unshift('❌ Tu zona de combate está llena (Máx 5).');
                return;
            }
            this.esferas_actuales -= carta.costo;
            let carta_instanciada = Object.assign({}, carta, { uid: Date.now() + Math.random() });
            this.campo_jugador.push(carta_instanciada);
            this.mano = this.mano.filter(c => c.id !== carta.id);
            this.historial.unshift(`✨ Invocas a ${carta.name}.`);
        },

        seleccionarAtacante(guerrero) {
            if (guerrero.tipo_ki === 'zero' || guerrero.tipo_ki === 'unknown') {
                this.historial.unshift('❌ No puede declarar ataques.');
                return;
            }
            this.guerrero_atacante = guerrero;
            this.historial.unshift(`🎯 ${guerrero.name} en posición de ataque.`);
        },

        atacarObjetivo(objetivoCPU) {
            if (!this.guerrero_atacante) return;
            if (objetivoCPU) {
                let diff = this.guerrero_atacante.atk - objetivoCPU.atk;
                if (diff > 0) {
                    this.cpu_lp = Math.max(0, this.cpu_lp - diff);
                    this.historial.unshift(`⚔️ ${this.guerrero_atacante.name} fulmina a ${objetivoCPU.name}. Daño: ${diff}`);
                    this.campo_cpu = this.campo_cpu.filter(c => c.uid !== objetivoCPU.uid);
                } else if (diff < 0) {
                    this.player_lp = Math.max(0, this.player_lp - Math.abs(diff));
                    this.historial.unshift(`🚨 Pierdes el choque. Sufres: ${Math.abs(diff)}`);
                    this.campo_jugador = this.campo_jugador.filter(c => c.uid !== this.guerrero_atacante.uid);
                } else {
                    this.historial.unshift('🛡️ Empate de poder. Ambos caen.');
                    this.campo_jugador = this.campo_jugador.filter(c => c.uid !== this.guerrero_atacante.uid);
                    this.campo_cpu = this.campo_cpu.filter(c => c.uid !== objetivoCPU.uid);
                }
            } else {
                this.cpu_lp = Math.max(0, this.cpu_lp - this.guerrero_atacante.atk);
                this.historial.unshift(`💥 ¡Ataque directo por ${this.guerrero_atacante.atk} LP!`);
            }
            this.guerrero_atacante = null;
        },

        robarCarta() {
            // Roba 1 carta si el mazo tiene y si la mano tiene menos de 7
            if (this.mazo_jugador.length > 0 && this.mano.length < 7) {
                let nueva_carta = this.mazo_jugador.shift();
                this.mano.push(nueva_carta);
                this.historial.unshift(`🃏 Robas a ${nueva_carta.name} del mazo.`);
            } else if (this.mano.length >= 7) {
                this.historial.unshift('⚠️ Mano llena, no puedes robar más cartas.');
            }
        },

        terminarTurno() {
            this.turno++;
            this.esferas_max = Math.min(10, this.esferas_max + 1);
            this.esferas_actuales = this.esferas_max;

            // Dinámica de robo al iniciar tu nuevo turno
            this.robarCarta();

            this.turnoCPU();
        },

        turnoCPU() {
            while (this.campo_cpu.length < 3 && this.mazo_cpu.length > 0) {
                let nc = this.mazo_cpu.shift();
                this.campo_cpu.push(Object.assign({}, nc, { uid: Date.now() + Math.random() }));
            }
        },

        reiniciarMecanicas() {
            this.player_lp = 30000;
            this.cpu_lp = 30000;
            this.turno = 1;
            this.esferas_max = 1;
            this.esferas_actuales = 1;
            this.campo_jugador = [];
            this.campo_cpu = [];
            this.guerrero_atacante = null;
        }
     }"
>
    <div class="w-full xl:w-1/4 flex-shrink-0">
        {% include 'game/componentes/consola.html' %}
    </div>

    <div class="w-full xl:w-3/4 flex flex-col space-y-4">
        <div class="flex-grow">{% include 'game/componentes/arena.html' %}</div>

        <div
            class="bg-gray-900/40 border border-gray-800 rounded-2xl p-3 shadow-xl"
        >
            <h3
                class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1"
            >
                Tu Mano Actual
            </h3>

            <div
                class="grid grid-cols-3 sm:grid-cols-7 gap-2 min-h-[140px] items-center justify-center"
            >
                <template x-for="carta in mano" :key="carta.id">
                    {% include 'game/componentes/tarjeta.html' %}
                </template>

                <template x-if="mano.length === 0">
                    <p
                        class="col-span-full text-center text-gray-600 font-mono text-sm"
                    >
                        Tu mano está vacía. Presiona "Invocar Mazo".
                    </p>
                </template>
            </div>
        </div>
    </div>
</div>
{% endblock %}
